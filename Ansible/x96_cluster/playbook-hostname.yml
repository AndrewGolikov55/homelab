---
- name: Set hostname and update /etc/hosts file
  hosts: all
  become: yes
  gather_facts: yes
  tasks:

    - name: Set hostname
      command: 
        cmd: "hostnamectl set-hostname {{ inventory_hostname }}"
      register: hostname_result

    - name: Show the new hostname
      debug:
        msg: "The new hostname is {{ inventory_hostname }}"

    - name: Update /etc/hosts file
      lineinfile:
        dest: /etc/hosts
        regexp: '^127.0.1.1\   armbian'
        state: absent

    - name: Add new ansible_host to /etc/hosts
      lineinfile:
        dest: /etc/hosts
        line: "{{ ansible_host }} {{ inventory_hostname }}"

    - name: Show the new ansible_host
      debug:
        msg: "The new ansible_host is <{{ ansible_host }} {{ inventory_hostname }}"

    - name: Reboot after hostname change
      reboot: